<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題登録</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #f7f8f5;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  color: #24352b;

  display: flex;
  justify-content: center;
  align-items: center;
}

.page {
  width: 90%;
  max-width: 620px;
  background: #ffffff;
  border-radius: 24px;
  padding: 42px;
  box-shadow: 0 12px 32px rgba(44, 74, 55, 0.12);
  border: 1px solid #e3e8df;
}

h1 {
  margin-top: 0;
  color: #2f5d46;
  font-size: 2.4rem;
  letter-spacing: -1px;
}

textarea,
input,
select {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;
  box-sizing: border-box;
  border: 1px solid #cfd8cf;
  border-radius: 12px;
  background: #fbfcfa;
  color: #24352b;
  font-size: 16px;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #2f5d46;
  color: white;
  font-size: 17px;
  font-weight: 600;
}

button:hover {
  background: #3f7358;
}

.top-button {
  display: inline-block;
  margin-top: 18px;
  padding: 12px 18px;
  color: #2f5d46;
  border: 1px solid #2f5d46;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
}

.top-button:hover {
  background: #eef5f1;
}

.button-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.button-row button {
  flex: 4;
}

.manage-button {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;

  border: 1px solid #2f5d46;
  border-radius: 14px;
  color: #2f5d46;
  text-decoration: none;
  font-weight: 600;
  background: white;
}

.manage-button:hover {
  background: #eef5f1;
}

</style>

</head>

<body>

<div class="page">
  <h1>問題追加</h1>

  <input
    id="newCategory"
    placeholder="新しいカテゴリ名"
  >

  <div class="button-row">
    <button onclick="addCategory()">
      カテゴリ追加
    </button>

    <a href="category-list.html" class="manage-button">
      管理
    </a>
  </div>

  <textarea
    id="question"
    placeholder="問題文"
  ></textarea>

  <input
    id="answer"
    placeholder="答え"
  >

  <select id="categorySelect"></select>

  <button onclick="addQuestion()">
    保存
  </button>

  <a href="index.html" class="top-button">
    TOPへ戻る
  </a>
</div>

<script>

async function loadCategories() {

  const response =
    await fetch("http://13.158.70.243:3000/categories");

  const categories =
    await response.json();

  const select =
    document.getElementById("categorySelect");

  select.innerHTML = "";

  categories.forEach(category => {

    const option =
      document.createElement("option");

    option.value = category.name;
    option.textContent = category.name;

    select.appendChild(option);

  });
}

const editIndex =
  localStorage.getItem("editQuestionIndex");


async function addQuestion() {
  const question =
    document.getElementById("question").value.trim();

  const answer =
    document.getElementById("answer").value.trim();

  const category =
    document.getElementById("categorySelect").value;

  if (!question || !answer || !category) {
    alert("未入力の項目があります");
    return;
  }

  await fetch("http://13.158.70.243:3000/questions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      category,
      question,
      answer
    })
  });

  alert("RDSに登録しました");

  document.getElementById("question").value = "";
  document.getElementById("answer").value = "";
}

function loadEditData() {

  if (editIndex === null) return;

  const questions =
    JSON.parse(
      localStorage.getItem("customQuestions")
    ) || [];

  const question =
    questions[editIndex];

  if (!question) return;

  document.getElementById("question").value =
    question.question;

  document.getElementById("answer").value =
    question.answer;

  document.getElementById("categorySelect").value =
    question.category;

}

async function addCategory() {

  const name =
    document.getElementById("newCategory")
      .value
      .trim();

  if (!name) {
    alert("カテゴリ名を入力してください");
    return;
  }

  await fetch(
    "http://13.158.70.243:3000/categories",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name })
    }
  );

  document.getElementById("newCategory").value = "";

  await loadCategories();

  alert("カテゴリを追加しました");
}

loadCategories();

</script>

</body>
</html>
