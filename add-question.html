<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題登録</title>

<style>

body {
  font-family: sans-serif;
  max-width: 600px;
  margin: 20px auto;
  padding: 20px;
}

input,
textarea,
select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

button {
  padding: 10px 20px;
  margin-right: 5px;
}

</style>

</head>
<body>

<h2>カテゴリ登録</h2>

<input id="newCategory" placeholder="カテゴリ名">

<button onclick="addCategory()">
カテゴリ追加
</button>

<hr>

<h2>問題登録</h2>

<textarea
  id="question"
  placeholder="問題文"
></textarea>

<input
id="answer"
placeholder="答え"

>

<select id="categorySelect"></select>

<button onclick="addQuestion()">
保存
</button>

<script>

let categories =
  JSON.parse(
    localStorage.getItem("categories")
  ) || ["LinuC"];

const editIndex =
  localStorage.getItem("editQuestionIndex");

function loadCategories() {

  const select =
    document.getElementById("categorySelect");

  select.innerHTML = "";

  categories.forEach(category => {

    const option =
      document.createElement("option");

    option.value = category;
    option.textContent = category;

    select.appendChild(option);

  });

}

function addCategory() {

  const category =
    document
      .getElementById("newCategory")
      .value
      .trim();

  if (!category) return;

  categories.push(category);

  localStorage.setItem(
    "categories",
    JSON.stringify(categories)
  );

  loadCategories();

  document.getElementById(
    "newCategory"
  ).value = "";

}

function addQuestion() {

  const question =
    document
      .getElementById("question")
      .value
      .trim();

  const answer =
    document
      .getElementById("answer")
      .value
      .trim();

  const category =
    document
      .getElementById("categorySelect")
      .value;

  if (!question || !answer) {
    alert("問題文と答えを入力してください");
    return;
  }

  let questions =
    JSON.parse(
      localStorage.getItem("customQuestions")
    ) || [];

  if (editIndex !== null) {

    questions[editIndex] = {
      question,
      answer,
      category
    };

    localStorage.removeItem(
      "editQuestionIndex"
    );

    alert("問題を更新しました");

  } else {

    questions.push({
      question,
      answer,
      category
    });

    alert("問題を登録しました");

  }

  localStorage.setItem(
    "customQuestions",
    JSON.stringify(questions)
  );

  location.href = "question-list.html";

}

function loadEditData() {

  if (editIndex === null) return;

  const questions =
    JSON.parse(
      localStorage.getItem("customQuestions")
    ) || [];

  const question =
    questions[editIndex];

  if (!question) return;

  document.getElementById("question").value =
    question.question;

  document.getElementById("answer").value =
    question.answer;

  document.getElementById("categorySelect").value =
    question.category;

}

loadCategories();
loadEditData();

</script>

</body>
</html>
