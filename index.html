<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<title>MyDeck</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #f7f8f5;
  font-family: "Manrope", "Segoe UI", sans-serif;
  color: #24352b;

  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 90%;
  max-width: 620px;
  background: #ffffff;
  border-radius: 24px;
  padding: 48px 42px;
  text-align: center;

  box-shadow: 0 12px 32px rgba(44, 74, 55, 0.12);
  border: 1px solid #e3e8df;
}

h1 {
  margin: 0;
  margin-bottom: 8px;
  color: #2f5d46;
  font-size: 3.4rem;
  font-weight: 700;
  letter-spacing: -1px;
}

.subtitle {
  margin: 0 0 2px 0;
  color: #6f7d73;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.2;
}

.section-title {
  margin-bottom: 12px;
  color: #365b45;
  font-weight: 600;
  text-align: left;
}

select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #cfd8cf;
  background: #fbfcfa;
  color: #24352b;
  font-size: 16px;
  margin-bottom: 16px;
}

.start-button,
.menu a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  text-decoration: none;
  border-radius: 14px;
  padding: 15px;

  font-family:
    "Yu Gothic",
    "Hiragino Sans",
    sans-serif;

  
  letter-spacing: 0.03em;

  transition: 0.2s;
}

.start-button {
  background: #2f5d46;
  color: white;

  font-family: "Segoe UI", sans-serif;

  font-size: 22px;
  font-weight: 700;

  margin-bottom: 28px;
}

.start-button:hover,
.menu a:hover {
  background: #3f7358;
  transform: translateY(-2px);
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 18px;
}

.menu a {
  background: #edf3ed;
  color: #2f5d46;
  border: 1px solid #dbe6da;

  height: 92px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: 4px;

  font-family: "Segoe UI", sans-serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.02em;

  text-decoration: none;
}

.menu a:hover {
  color: white;
}

.material-symbols-outlined {
  font-size: 36px;
  color: #2f5d46;

  font-variation-settings:
  'FILL' 0,
  'wght' 300,
  'GRAD' 0,
  'opsz' 24;
}

.divider {
  height: 1px;
  background: #e3e8df;
  margin: 26px 0;
}

#logoutButton {
  width: auto;
  padding: 8px 12px;
  border: 1px solid #2f5d46;
  border-radius: 10px;
  background: white;
  color: #2f5d46;
  font-size: 13px;
}

.top-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 16px;
}

.welcome-message {
  margin: 0 0 26px 0;
  color: #6f7d73;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.2;
}

#welcomeUser {
  color: #2f5d46;
  font-weight: 600;
}

</style>
</head>

<body>

<div class="card">
  <div class="top-bar">
    <button
      id="logoutButton"
      onclick="logout()">
      ログアウト
    </button>
  </div>

  <h1>MyDeck</h1>
  <p class="subtitle">Your personal question deck.</p>

  <p class="welcome-message">
  Welcome back,
  <span id="welcomeUser"></span>.
</p>

  <div class="section-title">問題カテゴリを選択</div>

  <select id="deckSelect"></select>

  <div class="section-title">出題数</div>

<select id="questionCount">
  <option value="10">10問</option>
  <option value="20">20問</option>
  <option value="30" selected>30問</option>
  <option value="all">全問</option>
</select>

  <a class="start-button" href="quiz.html" onclick="saveSelectedCategory()">
  START
</a>

  <div class="divider"></div>

  <div class="menu">
  <a href="add-question.html">
    <span class="material-symbols-outlined">add_circle</span>
    <span>問題追加</span>
  </a>

  <a href="question-list.html">
    <span class="material-symbols-outlined">list_alt</span>
    <span>問題一覧</span>
  </a>

  <a href="history.html">
    <span class="material-symbols-outlined">analytics</span>
    <span>成績確認</span>
  </a>

  <a href="account.html">
    <span class="material-symbols-outlined">person</span>
    <span>アカウント管理</span>
  </a>
</div>
</div>

<script>

async function loadDecks() {
  const select = document.getElementById("deckSelect");

 const userId = localStorage.getItem("userId");

const response =
  await fetch(
    `http://13.158.70.243:3000/categories?userId=${userId}`
  );

const categories =
  await response.json();

  select.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = "all";
  allOption.textContent = "全カテゴリ";
  select.appendChild(allOption);

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category.name; 
    option.textContent = category.name;
    select.appendChild(option);
  });
}

function saveSelectedCategory() {
  const selectedCategory =
    document.getElementById("deckSelect").value;

  const questionCount =
    document.getElementById("questionCount").value;

  localStorage.setItem("selectedCategory", selectedCategory);
  localStorage.setItem("questionCount", questionCount);
}

const username = localStorage.getItem("username");

if (!username) {
  location.href = "login.html";
}

document.getElementById("welcomeUser").textContent =
  username;

function logout() {
  localStorage.removeItem("userId");
  localStorage.removeItem("username");
  location.href = "login.html";
}

loadDecks();
</script>

</body>
</html>
