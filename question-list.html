<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題管理</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #f7f8f5;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  color: #24352b;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 0;
}

.page {
  width: 90%;
  max-width: 720px;
  background: #ffffff;
  border-radius: 24px;
  padding: 42px;
  box-shadow: 0 12px 32px rgba(44, 74, 55, 0.12);
  border: 1px solid #e3e8df;
}

h1 {
  margin-top: 0;
  margin-bottom: 20px;
  color: #2f5d46;
  font-size: 2rem;
  letter-spacing: -1px;
}

select {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border-radius: 12px;
  border: 1px solid #cfd8cf;
  background: #fbfcfa;
  color: #24352b;
  font-size: 16px;
}

.card {
  background: #edf3ed;
  color: #24352b;
  border: 1px solid #dbe6da;
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 14px;
}

.card p {
  margin: 8px 0;
}

button {
  padding: 10px 16px;
  margin-right: 8px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #2f5d46;
  color: white;
  font-weight: 600;
}

button:hover {
  background: #3f7358;
}

.top-button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 18px;
  color: #2f5d46;
  border: 1px solid #2f5d46;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
}

.top-button:hover {
  background: #eef5f1; 
}

.card-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 12px;
}

.edit-btn,
.delete-btn {
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 8px;
  background: white;
  cursor: pointer;
}

.edit-btn {
  color: #2f5d46;
  border: 1px solid #2f5d46;
}

.edit-btn:hover {
  background: #eef5f1;
}

.delete-btn {
  color: #8b3a3a;
  border: 1px solid #d7b5b5;
}

.delete-btn:hover {
  background: #faf5f5;
}

.top-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 16px;
}

.top-button {
  display: inline-block;
  padding: 8px 14px;

  color: #2f5d46;
  border: 1px solid #2f5d46;
  border-radius: 10px;

  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

</style>
</head>
<body>
  <div class="page">

  <div class="top-bar">
    <a href="index.html" class="top-button">
      TOPへ戻る
    </a>
  </div>

  <h1>問題一覧</h1>

    <select id="categoryFilter" onchange="loadQuestions()">
      <option value="all">全カテゴリ</option>
    </select>

    <div id="questionList"></div>

  </div>

<script>

  async function loadCategories() {
  const userId = localStorage.getItem("userId");

const response =
  await fetch(
    `http://13.158.70.243:3000/categories?userId=${userId}`
  );
  const categories = await response.json();

  const select = document.getElementById("categoryFilter");

  select.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = "all";
  allOption.textContent = "全カテゴリ";
  select.appendChild(allOption);

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category.name;
  option.textContent = category.name;

  select.appendChild(option);
});
}

async function loadQuestions() {
  const userId = localStorage.getItem("userId");
const response =
  await fetch(
    `http://13.158.70.243:3000/questions?userId=${userId}`
  );
  const questions = await response.json();

  console.log("userId:", userId);
console.log("questions:", questions);

  const selectedCategory =
  document.getElementById("categoryFilter").value;

const filteredQuestions =
  selectedCategory === "all"
    ? questions
    : questions.filter(item => item.category === selectedCategory);

  const list = document.getElementById("questionList");
  list.innerHTML = "";

  if (filteredQuestions.length === 0) {
    list.textContent = "登録された問題はありません。";
    return;
  }

  filteredQuestions.forEach((item) => {
    const card = document.createElement("div");
    card.className = "card";

  card.innerHTML = `
  <p><strong>問題：</strong>${item.question}</p>
  <p><strong>答え：</strong>${item.answer}</p>
  <p><strong>カテゴリ：</strong>${item.category}</p>

  <div class="card-actions">
    <button class="edit-btn" onclick="location.href='edit-question.html?id=${item.id}'">
      編集
    </button>

    <button class="delete-btn" onclick="deleteQuestion(${item.id})">
      削除
    </button>
  </div>
`;

    list.appendChild(card);
  });
}
async function editQuestion(id) {
  const question = prompt("新しい問題文を入力してください");
  if (!question) return;

  const answer = prompt("新しい答えを入力してください");
  if (!answer) return;

  const category = prompt("カテゴリを入力してください");
  if (!category) return;

  await fetch(`http://13.158.70.243:3000/questions/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      category,
      question,
      answer
    })
  });

  loadQuestions();
}

async function deleteQuestion(id) {

  if (!confirm("この問題を削除しますか？")) {
    return;
  }

  await fetch(
    `http://13.158.70.243:3000/questions/${id}`,
    {
      method: "DELETE"
    }
  );

  loadQuestions();
}

async function initPage() {
  await loadCategories();
  await loadQuestions();
}

initPage();
</script>

</body>
</html>
