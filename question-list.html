<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題一覧</title>
<style>
body {
  font-family: sans-serif;
  max-width: 800px;
  margin: 20px auto;
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
}

button {
  margin-right: 8px;
  padding: 6px 12px;
}
</style>
</head>
<body>

<h2>登録した問題一覧</h2>

<div id="questionList"></div>

<p>
  <a href="add-question.html">問題登録へ戻る</a>
</p>

<script>

async function loadQuestions() {
  const response = await fetch("http://13.158.70.243:3000/questions");
  const questions = await response.json();

  const list = document.getElementById("questionList");
  list.innerHTML = "";

  if (questions.length === 0) {
    list.textContent = "登録された問題はありません。";
    return;
  }

  questions.forEach((item) => {
    const card = document.createElement("div");
    card.className = "card";

   card.innerHTML = `
  <p><strong>問題：</strong>${item.question}</p>
  <p><strong>答え：</strong>${item.answer}</p>
  <p><strong>カテゴリ：</strong>${item.category}</p>

  <button onclick="editQuestion(${item.id})">編集</button>
  <button onclick="deleteQuestion(${item.id})">削除</button>
`; 

    list.appendChild(card);
  });
}
async function editQuestion(id) {
  const question = prompt("新しい問題文を入力してください");
  if (!question) return;

  const answer = prompt("新しい答えを入力してください");
  if (!answer) return;

  const category = prompt("カテゴリを入力してください");
  if (!category) return;

  await fetch(`http://13.158.70.243:3000/questions/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      category,
      question,
      answer
    })
  });

  loadQuestions();
}

async function deleteQuestion(id) {

  if (!confirm("この問題を削除しますか？")) {
    return;
  }

  await fetch(
    `http://13.158.70.243:3000/questions/${id}`,
    {
      method: "DELETE"
    }
  );

  loadQuestions();
}






loadQuestions();
</script>

</body>
</html>
