<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カテゴリ管理</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #f7f8f5;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  color: #24352b;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
}

.page {
  width: 90%;
  max-width: 620px;
  background: #ffffff;
  border-radius: 24px;
  padding: 42px;
  box-shadow: 0 12px 32px rgba(44, 74, 55, 0.12);
  border: 1px solid #e3e8df;
}

h1 {
  margin-top: 0;
  margin-bottom: 20px;
  color: #2f5d46;
  font-size: 2rem;
  letter-spacing: -1px;
}

.card {
  padding: 8px 16px;
  margin-bottom: 8px;
  background: #edf3ed;
  border: 1px solid #dbe6da;
  border-radius: 12px;
}

.top-button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 18px;
  color: #2f5d46;
  border: 1px solid #2f5d46;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
}

.top-button:hover {
  background: #eef5f1;
}
.category-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.category-actions {
  display: flex;
  gap: 10px;
}

.edit-btn,
.delete-btn {
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 8px;
}

.edit-btn {
  background: white;
  color: #2f5d46;
  border: 1px solid #2f5d46;
}

.edit-btn:hover {
  background: #eef5f1;
}

.delete-btn {
  background: white;
  color: #8b3a3a;
  border: 1px solid #d7b5b5;
}

.delete-btn:hover {
  background: #faf5f5;
}

.category-name {
  font-size: 16px;
  font-weight: 500;
  color: #2f5d46;
}

</style>

</head>

<body>
<div class="page">
  <h1>カテゴリ管理</h1>

  <div id="categoryList"></div>

 <a href="add-question.html" class="top-button">
  問題追加へ戻る
</a>
</div>

<script>

async function loadCategories() {
  const userId = localStorage.getItem("userId");

  const response =
    await fetch(
      `http://13.158.70.243:3000/categories?userId=${userId}`
    );

  const categories = await response.json();

  const list = document.getElementById("categoryList");
  list.innerHTML = "";

  if (categories.length === 0) {
    list.textContent = "登録されたカテゴリはありません。";
    return;
  }

  categories.forEach(category => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="category-row">
        <span class="category-name">
          ${category.name}
        </span>

        <div class="category-actions">
          <button
            class="edit-btn"
            onclick="editCategory(${category.id}, '${category.name}')">
            編集
          </button>

          <button
            class="delete-btn"
            onclick="deleteCategory(${category.id})">
            削除
          </button>
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

async function editCategory(id, currentName) {

  const newName =
    prompt("新しいカテゴリ名", currentName);

  if (!newName) return;

  await fetch(
    `http://13.158.70.243:3000/categories/${id}`,
    {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: newName
      })
    }
  );

  loadCategories();
}

async function deleteCategory(id) {

  if (
    !confirm("このカテゴリを削除しますか？")
  ) {
    return;
  }

  await fetch(
    `http://13.158.70.243:3000/categories/${id}`,
    {
      method: "DELETE"
    }
  );

  loadCategories();
}

loadCategories();


</script>

</body>
</html>
