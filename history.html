<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>成績の推移</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
   body {
  margin: 0;
  min-height: 100vh;
  background: #f7f8f5;
  font-family: "Segoe UI", "Yu Gothic", sans-serif;
  color: #24352b;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 0;
}

.page {
  width: 90%;
  max-width: 720px;
  background: #ffffff;
  border-radius: 24px;
  padding: 42px;
  box-shadow: 0 12px 32px rgba(44, 74, 55, 0.12);
  border: 1px solid #e3e8df;
}

.top-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 16px;
}

.top-button {
  padding: 8px 14px;
  color: #2f5d46;
  border: 1px solid #2f5d46;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

h1 {
  margin-top: 0;
  margin-bottom: 20px;
  color: #2f5d46;
  font-size: 2rem;
  letter-spacing: -1px;
}

#categoryFilter {
  width: 100%;
  height: 50px;
  padding: 14px;
  margin-bottom: 24px;
  border-radius: 12px;
  border: 1px solid #cfd8cf;
  background: #fbfcfa;
  color: #24352b;
  font-size: 16px;
}

.chart-card {
  background: #fbfcfa;
  border: 1px solid #e3e8df;
  border-radius: 16px;
  padding: 18px 24px;
}

#chart {
  width: 100% !important;
  max-height: 420px;
}

.top-button:hover {
  background: #eef5f1;
}


  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <a href="index.html" class="top-button">TOPへ戻る</a>
    </div>

    <h1>成績確認</h1>

    <select id="categoryFilter">
      <option value="all">全カテゴリ</option>
    </select>

    <div class="chart-card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
