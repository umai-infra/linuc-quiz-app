<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinuC  Lv1-101 コマ問</title>
<style>
  body {
    text-align: center;
    font-family: sans-serif;
    padding: 20px;
    max-width: 500px;
    margin: auto;
  }
  .card {
    padding: 20px;
    border-radius: 10px;
    background: #dcedc8; 
    margin-bottom: 20px;
  }
#result {
  margin-top: 30px;
   white-space: pre-line;
}
  button {
    width: 65%;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #3395ff;
    color: white;
    margin-top: 10px;
  }
  input {
    width: 80%;
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc; 
  }
h2 {
  text-align: center;
}
#questionNumber {
  font-size: 14px;      
  color: #555;          
  margin-bottom: 5px;   
  text-align: left;    
}
#question {
  text-align: left;
  white-space: pre-line; 
}
</style>
</head>
<body>

<h2>LinuC  Lv1-101 コマ問</h2>

<div id="progress" style="margin-bottom: 10px; font-size: 18px; color: #333;"></div>

<div class="card">
  <div id="questionNumber"></div>
  <div id="question">問題を読み込み中…</div>
</div>

<div class="card">
  <input id="userInput" type="text" placeholder="入力">
</div>

<button onclick="checkAnswer()">答え合わせ</button>
<button onclick="nextQuestion()">次の問題</button>
<button onclick="prevQuestion()">前の問題に戻る</button>

<div class="card" id="result" style="display:none;"></div>

<script>

let questionCount = 0;
const maxQuestions = 30;
let correctCount = 0; 
let current = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

let allQuestions = [];
let selected = [];

async function loadAllQuestions() {
  const response = await fetch("http://13.158.70.243:3000/questions");
  const rdsQuestions = await response.json();

 allQuestions = rdsQuestions.map((item, index) => ({
  no: index + 1,
  q: item.question,
  a: item.answer,
  category: item.category
}));
}


function startQuiz() {
  questionCount = 0;
  correctCount = 0;
  current = 0;

  const selectedCategory =
  localStorage.getItem("selectedCategory") || "all";

  let filteredQuestions = allQuestions;

  if (selectedCategory !== "all") {
    filteredQuestions = allQuestions.filter(
      item => item.category === selectedCategory
    );
  }

  shuffle(filteredQuestions);

  selected = filteredQuestions.slice(0, 30);

  if (selected.length === 0) {
    document.getElementById("questionNumber").textContent = "";
    document.getElementById("question").textContent =
      "このカテゴリには問題がありません。";
    document.getElementById("progress").textContent = "0 / 0";
    return;
  }

  loadQuestion();
}

async function initQuiz() {
  await loadAllQuestions();
  startQuiz();
}

initQuiz();

function updateProgress() {
  document.getElementById("progress").textContent =
    `${questionCount + 1} / ${maxQuestions}`;
}

function loadQuestion() {
  const qData = selected[current];

  document.getElementById("questionNumber").textContent =
    `問題番号：${qData.no}`;

  document.getElementById("question").textContent = qData.q;

  document.getElementById("userInput").value = "";
  document.getElementById("result").style.display = "none";

 updateProgress();
}

function checkAnswer() {
  const user = document.getElementById("userInput").value.trim().toLowerCase();
  const correct = selected[current].a;

  const resultBox = document.getElementById("result");
  resultBox.style.display = "block";

  let isCorrect = false;

  if (Array.isArray(correct)) {
      isCorrect = correct.map(c => c.toLowerCase()).includes(user);
  } else {
      isCorrect = user === correct.toLowerCase();
  }

  if (isCorrect) {
    resultBox.style.background = "#e3f2fd";

       if (Array.isArray(correct)) {
      const others = correct
        .map(c => c.toLowerCase())
        .filter(c => c !== user);

      if (others.length > 0) {
        resultBox.textContent = `【〇】正解\n他の正答：${others.join(" / ")}`;
      } else {
        resultBox.textContent = "【〇】正解";
      }
    } else {
      resultBox.textContent = "【〇】正解";
    }

    correctCount++;

  } else {
    resultBox.textContent = `【×】不正解\n正解は「${Array.isArray(correct) ? correct.join(" / ") : correct}」`;
    resultBox.style.background = "#ffd4d4";
  }
}

function nextQuestion() {
  questionCount++;

　if (current >= selected.length - 1) {

    localStorage.setItem("correctCount", correctCount);
    localStorage.setItem("questionCount", questionCount);

let history = JSON.parse(localStorage.getItem("history") || "[]");

history.push({
  correct: correctCount,
  total: questionCount,
  rate: Math.round((correctCount / questionCount) * 100),
  date: new Date().toLocaleString()
});

localStorage.setItem("history", JSON.stringify(history));
    window.location.href = "result.html";
    return;
  }

  current++;
  loadQuestion();
}

function prevQuestion() {
  if (current > 0) {
    current--;
    questionCount--;
    loadQuestion();
  }
}

</script>

</body>
</html>
